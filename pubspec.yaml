name: unplug
description: Focus-first screen time management app. Block short-form content tabs without killing the app.
publish_to: 'none'
version: 1.2.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_mobile_ads: ^4.0.0
  shared_preferences: ^2.2.2
  usage_stats: ^1.3.1
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true

  # Standard fallback (used for older Android & iOS)
  image_path: "assets/icons/ic_launcher_foreground.png"

  # Android Adaptive Icon Configuration
  adaptive_icon_background: "assets/icons/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/ic_launcher_foreground.png"
