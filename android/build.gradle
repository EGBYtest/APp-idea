allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Ensure all subprojects (including plugins) use a modern compileSdk
    afterEvaluate { sub ->
        if (sub.hasProperty("android") && sub.android.hasProperty("compileSdkVersion")) {
            sub.android.compileSdkVersion = 34
        }
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
